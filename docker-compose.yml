services:
  minio:
    image: minio/minio:latest
    container_name: letta-vision-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ${MINIO_DATA_PATH:-./data/minio}:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: letta-vision-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set lv http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing lv/letta-vision &&
      echo 'bucket letta-vision ready'
      "
    restart: "no"

  letta-vision-db:
    image: pgvector/pgvector:pg16
    container_name: letta-vision-db
    environment:
      POSTGRES_USER: letta
      POSTGRES_PASSWORD: ${LETTA_POSTGRES_PASSWORD}
      POSTGRES_DB: letta
    volumes:
      - letta-vision-pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letta"]
      interval: 10s
      timeout: 5s
      retries: 5

  letta-vision:
    build: ../letta-vision
    container_name: letta-vision
    ports:
      - "8283:8283"
    environment:
      - LETTA_PG_URI=postgresql://letta:${LETTA_POSTGRES_PASSWORD}@letta-vision-db:5432/letta
      - SECURE=true
      - LETTA_VERSION=${LETTA_VERSION:-0.5.0}
      - LETTA_SERVER_PASSWORD=${LETTA_SERVER_PASSWORD}
      - LETTA_ENCRYPTION_KEY=${LETTA_ENCRYPTION_KEY}
      - LETTA_TRACK_PROVIDER_TRACE=${LETTA_TRACK_PROVIDER_TRACE:-true}
      - LETTA_TELEMETRY_PROVIDER_TRACE_PG_METADATA_ONLY=${LETTA_TELEMETRY_PROVIDER_TRACE_PG_METADATA_ONLY:-true}
      - LETTA_LLM_REQUEST_TIMEOUT_SECONDS=${LETTA_LLM_REQUEST_TIMEOUT_SECONDS}
      - LETTA_LLM_STREAM_TIMEOUT_SECONDS=${LETTA_LLM_STREAM_TIMEOUT_SECONDS}
      - GLOBAL_MAX_CONTEXT_WINDOW_LIMIT=${GLOBAL_MAX_CONTEXT_WINDOW_LIMIT:-1000000}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_TITLE=${OPENROUTER_TITLE}
      - OPENROUTER_REFERER=${OPENROUTER_REFERER}
      - E2B_API_KEY=${E2B_API_KEY}
      - E2B_SANDBOX_TEMPLATE_ID=${E2B_SANDBOX_TEMPLATE_ID}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - LETTA_MEMFS_SERVICE_URL=local
      - MODEL_OVERRIDES_PATH=/data/shared/model_overrides.json
      - LETTA_OBJECT_STORE_URI=s3://letta-vision/images?endpoint=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - LETTA_DEFAULT_EMBEDDING_HANDLE=openrouter/google/gemini-embedding-2
      - LETTA_EMBED_ALL_MESSAGES=true
      - LETTA_IMAGE_CAPTION_MODEL_HANDLE=${LETTA_IMAGE_CAPTION_MODEL_HANDLE:-openrouter/minimax/minimax-m3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${MODEL_OVERRIDES_DIR:-./shared}:/data/shared:ro
      - letta-vision-memfs:/root/.letta/memfs
    depends_on:
      minio-init:
        condition: service_completed_successfully
      letta-vision-db:
        condition: service_healthy
    restart: unless-stopped

  letta-vision-client:
    build: ../letta-vision-client
    container_name: letta-vision-client
    ports:
      - "8284:8284"
    environment:
      - LETTA_BASE_URL=http://letta-vision:8283
      - LETTA_SERVER_PASSWORD=${LETTA_SERVER_PASSWORD}
      - LETTA_CLIENT_READ_TIMEOUT_SECONDS=${LETTA_LLM_STREAM_TIMEOUT_SECONDS:-600}
      - MODEL_OVERRIDES_PATH=/data/shared/model_overrides.json
    volumes:
      # RW: client persists vision overrides from Providers UI (server mount stays :ro)
      - ${MODEL_OVERRIDES_DIR:-./shared}:/data/shared
    depends_on:
      - letta-vision
    restart: unless-stopped

volumes:
  letta-vision-pgdata:
  letta-vision-memfs: